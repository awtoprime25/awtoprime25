<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200">
  <rect width="1200" height="200" fill="#0a0a0a"/>
  
  <!-- Background subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="200" fill="url(#grid)"/>
  
  <!-- Frequency waves - multiple layers -->
  <g opacity="0.3">
    <path d="M0,100 Q30,55 60,100 T120,100 T180,100 T240,100 T300,100 T360,100 T420,100 T480,100 T540,100 T600,100 T660,100 T720,100 T780,100 T840,100 T900,100 T960,100 T1020,100 T1080,100 T1140,100 T1200,100" 
          fill="none" stroke="#ffffff" stroke-width="1"/>
  </g>
  
  <!-- Main waveform - bass frequencies -->
  <path d="M0,100 
           C50,100 50,15 100,15 
           C150,15 150,155 200,155 
           C250,155 250,35 300,35 
           C350,35 350,175 400,175 
           C450,175 450,-5 500,-5 
           C550,-5 550,135 600,135 
           C650,135 650,25 700,25 
           C750,25 750,165 800,165 
           C850,165 850,5 900,5 
           C950,5 950,145 1000,145 
           C1050,145 1050,45 1100,45 
           C1150,45 1150,100 1200,100" 
        fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>
  
  <!-- Mid frequencies - tighter waves -->
  <path d="M0,100 
           Q25,65 50,100 T100,100 T150,100 T200,100 T250,100 T300,100 T350,100 T400,100 
           T450,100 T500,100 T550,100 T600,100 T650,100 T700,100 T750,100 T800,100 
           T850,100 T900,100 T950,100 T1000,100 T1050,100 T1100,100 T1150,100 T1200,100" 
        fill="none" stroke="#c0c0c0" stroke-width="1.5" opacity="0.6"/>
        
  <!-- High frequencies - rapid oscillation -->
  <path d="M0,100 
           L10,85 L20,115 L30,90 L40,110 L50,95 L60,105 L70,93 L80,107 L90,97 
           L100,103 L110,95 L120,105 L130,93 L140,107 L150,97 L160,103 L170,95 
           L180,105 L190,93 L200,107 L210,97 L220,103 L230,95 L240,105 L250,93 
           L260,107 L270,97 L280,103 L290,95 L300,105 L310,93 L320,107 L330,97 
           L340,103 L350,95 L360,105 L370,93 L380,107 L390,97 L400,103 L410,95 
           L420,105 L430,93 L440,107 L450,97 L460,103 L470,95 L480,105 L490,93 
           L500,107 L510,97 L520,103 L530,95 L540,105 L550,93 L560,107 L570,97 
           L580,103 L590,95 L600,105 L610,93 L620,107 L630,97 L640,103 L650,95 
           L660,105 L670,93 L680,107 L690,97 L700,103 L710,95 L720,105 L730,93 
           L740,107 L750,97 L760,103 L770,95 L780,105 L790,93 L800,107 L810,97 
           L820,103 L830,95 L840,105 L850,93 L860,107 L870,97 L880,103 L890,95 
           L900,105 L910,93 L920,107 L930,97 L940,103 L950,95 L960,105 L970,93 
           L980,107 L990,97 L1000,103 L1010,95 L1020,105 L1030,93 L1040,107 L1050,97 
           L1060,103 L1070,95 L1080,105 L1090,93 L1100,107 L1110,97 L1120,103 L1130,95 
           L1140,105 L1150,93 L1160,107 L1170,97 L1180,103 L1190,95 L1200,105" 
        fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.4"/>
  
  <!-- Vertical beat markers -->
  <line x1="200" y1="0" x2="200" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <line x1="400" y1="0" x2="400" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <line x1="600" y1="0" x2="600" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <line x1="800" y1="0" x2="800" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <line x1="1000" y1="0" x2="1000" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  
  <!-- Center line -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Walter text with glow effect -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <text x="600" y="115" 
        font-family="JetBrains Mono, monospace" 
        font-size="64" 
        font-weight="bold" 
        fill="#ffffff" 
        text-anchor="middle"
        filter="url(#glow)">Walter</text>
        
  <!-- Subtle corner accents -->
  <path d="M20,20 L20,50 M20,20 L50,20" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <path d="M1180,20 L1180,50 M1180,20 L1150,20" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <path d="M20,180 L20,150 M20,180 L50,180" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <path d="M1180,180 L1180,150 M1180,180 L1150,180" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
</svg>