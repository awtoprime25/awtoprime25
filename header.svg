<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <!-- Vinyl groove gradient -->
    <radialGradient id="vinylGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="15%" stop-color="#0a0a0a"/>
      <stop offset="25%" stop-color="#111111"/>
      <stop offset="35%" stop-color="#050505"/>
      <stop offset="45%" stop-color="#0d0d0d"/>
      <stop offset="55%" stop-color="#020202"/>
      <stop offset="65%" stop-color="#080808"/>
      <stop offset="75%" stop-color="#000000"/>
      <stop offset="85%" stop-color="#030303"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    
    <!-- Label gradient -->
    <radialGradient id="labelGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </radialGradient>
    
    <!-- Subtle noise filter -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" result="noise"/>
      <feBlend in="SourceGraphic" in2="noise" mode="overlay" opacity="0.03"/>
    </filter>
    
    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="#0d0d0d"/>
  
  <!-- Turntable platter base -->
  <ellipse cx="600" cy="150" rx="260" ry="260" fill="#151515" filter="url(#shadow)"/>
  
  <!-- Main vinyl record -->
  <circle cx="600" cy="150" r="240" fill="url(#vinylGrad)"/>
  
  <!-- Grooves - concentric circles with subtle variation -->
  <g fill="none" stroke="#1a1a1a" stroke-width="0.5" opacity="0.6">
    <circle cx="600" cy="150" r="235"/>
    <circle cx="600" cy="150" r="230"/>
    <circle cx="600" cy="150" r="225"/>
    <circle cx="600" cy="150" r="220"/>
    <circle cx="600" cy="150" r="215"/>
    <circle cx="600" cy="150" r="210"/>
    <circle cx="600" cy="150" r="205"/>
    <circle cx="600" cy="150" r="200"/>
    <circle cx="600" cy="150" r="195"/>
    <circle cx="600" cy="150" r="190"/>
    <circle cx="600" cy="150" r="185"/>
    <circle cx="600" cy="150" r="180"/>
    <circle cx="600" cy="150" r="175"/>
    <circle cx="600" cy="150" r="170"/>
    <circle cx="600" cy="150" r="165"/>
    <circle cx="600" cy="150" r="160"/>
    <circle cx="600" cy="150" r="155"/>
    <circle cx="600" cy="150" r="150"/>
    <circle cx="600" cy="150" r="145"/>
    <circle cx="600" cy="150" r="140"/>
    <circle cx="600" cy="150" r="135"/>
    <circle cx="600" cy="150" r="130"/>
    <circle cx="600" cy="150" r="125"/>
    <circle cx="600" cy="150" r="120"/>
  </g>
  
  <!-- Glare/light reflection on vinyl -->
  <ellipse cx="500" cy="80" rx="120" ry="60" fill="#ffffff" opacity="0.03" transform="rotate(-30 500 80)"/>
  
  <!-- Record label -->
  <circle cx="600" cy="150" r="80" fill="url(#labelGrad)"/>
  <circle cx="600" cy="150" r="75" fill="#f5f5f5"/>
  
  <!-- Label inner ring -->
  <circle cx="600" cy="150" r="70" fill="none" stroke="#d0d0d0" stroke-width="0.5"/>
  
  <!-- Spindle hole -->
  <circle cx="600" cy="150" r="4" fill="#000000"/>
  
  <!-- Label text: WALTER -->
  <text x="600" y="140" 
        font-family="JetBrains Mono, monospace" 
        font-size="22" 
        font-weight="bold" 
        fill="#000000" 
        text-anchor="middle"
        letter-spacing="4">WALTER</text>
  
  <!-- Side labels -->
  <text x="600" y="165" 
        font-family="JetBrains Mono, monospace" 
        font-size="8" 
        fill="#666666" 
        text-anchor="middle"
        letter-spacing="1">STEREO • 33⅓ RPM</text>
  
  <!-- Side A marker -->
  <text x="600" y="180" 
        font-family="JetBrains Mono, monospace" 
        font-size="10" 
        font-weight="bold" 
        fill="#000000" 
        text-anchor="middle">SIDE A</text>
  
  <!-- Small track markers on label -->
  <circle cx="555" cy="150" r="2" fill="#cccccc"/>
  <circle cx="645" cy="150" r="2" fill="#cccccc"/>
  <circle cx="600" cy="105" r="2" fill="#cccccc"/>
  <circle cx="600" cy="195" r="2" fill="#cccccc"/>
  
  <!-- Run-out groove text -->
  <path id="curve1" d="M 560,150 A 40,40 0 0,1 640,150" fill="none"/>
  <text font-family="JetBrains Mono, monospace" font-size="5" fill="#888888" letter-spacing="1">
    <textPath href="#curve1" startOffset="50%" text-anchor="middle">AWTOPRIME25 RECORDS</textPath>
  </text>
  
  <!-- Tone arm (simplified) -->
  <g opacity="0.9">
    <!-- Arm base -->
    <circle cx="920" cy="220" r="25" fill="#1a1a1a" stroke="#333333" stroke-width="2"/>
    <circle cx="920" cy="220" r="20" fill="#0a0a0a"/>
    
    <!-- Arm -->
    <line x1="920" y1="220" x2="750" y2="120" stroke="#c0c0c0" stroke-width="6" stroke-linecap="round"/>
    <line x1="920" y1="220" x2="750" y2="120" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Headshell -->
    <line x1="750" y1="120" x2="720" y2="105" stroke="#888888" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Cartridge -->
    <rect x="710" y="98" width="15" height="10" fill="#333333" transform="rotate(-30 717 103)"/>
    
    <!-- Needle on record -->
    <circle cx="718" cy="108" r="1.5" fill="#ffffff" opacity="0.8"/>
  </g>
  
  <!-- Corner info (like a record sleeve) -->
  <text x="40" y="40" 
        font-family="JetBrains Mono, monospace" 
        font-size="10" 
        fill="#555555" 
        letter-spacing="2">CAT.NO. AWTP-001</text>
  
  <text x="40" y="280" 
        font-family="JetBrains Mono, monospace" 
        font-size="10" 
        fill="#555555" 
        letter-spacing="2">MADE WITH CODE</text>
        
  <!-- Subtle texture overlay -->
  <rect width="1200" height="300" fill="url(#noise)" opacity="0.5"/>
</svg>