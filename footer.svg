<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 150">
  <rect width="1200" height="150" fill="#0a0a0a"/>
  
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="150" fill="url(#grid)"/>
  
  <!-- Mirrored waveform -->
  <path d="M0,75 
           C50,75 50,130 100,130 
           C150,130 150,30 200,30 
           C250,30 250,110 300,110 
           C350,110 350,20 400,20 
           C450,20 450,100 500,100 
           C550,100 550,40 600,40 
           C650,40 650,120 700,120 
           C750,120 750,25 800,25 
           C850,25 850,105 900,105 
           C950,105 950,35 1000,35 
           C1050,35 1050,115 1100,115 
           C1150,115 1150,75 1200,75" 
        fill="none" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
        
  <line x1="0" y1="75" x2="1200" y2="75" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
</svg>