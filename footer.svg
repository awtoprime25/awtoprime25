<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280">
  <defs>
    <linearGradient id="cassetteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="10%" stop-color="#1a1a1a"/>
      <stop offset="90%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="280" fill="#0d0d0d"/>
  
  <!-- Cassette body -->
  <rect x="150" y="40" width="900" height="200" rx="12" fill="url(#cassetteGrad)" stroke="#333333" stroke-width="2"/>
  
  <!-- Top edge highlight -->
  <rect x="152" y="42" width="896" height="3" rx="1.5" fill="#444444" opacity="0.5"/>
  
  <!-- Label area -->
  <rect x="170" y="55" width="860" height="120" rx="4" fill="#f0f0f0"/>
  <rect x="175" y="60" width="850" height="110" rx="2" fill="#ffffff"/>
  
  <!-- Label lines (ruled paper look) -->
  <line x1="175" y1="80" x2="1025" y2="80" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="175" y1="100" x2="1025" y2="100" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="175" y1="120" x2="1025" y2="120" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="175" y1="140" x2="1025" y2="140" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- WALTER text on label -->
  <text x="600" y="108" font-family="JetBrains Mono, monospace" font-size="42" font-weight="bold" fill="#000000" text-anchor="middle" letter-spacing="8">WALTER</text>
  
  <!-- Handwritten style text -->
  <text x="190" y="135" font-family="JetBrains Mono, monospace" font-size="11" fill="#666666" letter-spacing="1">MIXTAPE VOL. 1</text>
  <text x="190" y="155" font-family="JetBrains Mono, monospace" font-size="10" fill="#888888" letter-spacing="1">AWTOPRIME25 RECORDS</text>
  
  <!-- Right side label details -->
  <text x="1010" y="135" font-family="JetBrains Mono, monospace" font-size="9" fill="#999999" text-anchor="end" letter-spacing="1">25 MIN</text>
  <text x="1010" y="150" font-family="JetBrains Mono, monospace" font-size="9" fill="#999999" text-anchor="end" letter-spacing="1">TYPESHIFT</text>
  
  <!-- Tape window -->
  <rect x="350" y="180" width="500" height="45" rx="6" fill="#0a0a0a" stroke="#222222" stroke-width="3"/>
  
  <!-- Tape reels -->
  <g>
    <!-- Left reel -->
    <circle cx="440" cy="202" r="28" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
    <circle cx="440" cy="202" r="22" fill="#222222"/>
    <circle cx="440" cy="202" r="8" fill="#ffffff" opacity="0.1"/>
    <!-- Reel holes -->
    <circle cx="440" cy="190" r="2" fill="#0a0a0a"/>
    <circle cx="450" cy="202" r="2" fill="#0a0a0a"/>
    <circle cx="440" cy="214" r="2" fill="#0a0a0a"/>
    <circle cx="430" cy="202" r="2" fill="#0a0a0a"/>
    <circle cx="447" cy="195" r="2" fill="#0a0a0a"/>
    <circle cx="447" cy="209" r="2" fill="#0a0a0a"/>
    <circle cx="433" cy="209" r="2" fill="#0a0a0a"/>
    <circle cx="433" cy="195" r="2" fill="#0a0a0a"/>
    
    <!-- Right reel -->
    <circle cx="760" cy="202" r="28" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>
    <circle cx="760" cy="202" r="22" fill="#222222"/>
    <circle cx="760" cy="202" r="8" fill="#ffffff" opacity="0.1"/>
    <!-- Reel holes -->
    <circle cx="760" cy="190" r="2" fill="#0a0a0a"/>
    <circle cx="770" cy="202" r="2" fill="#0a0a0a"/>
    <circle cx="760" cy="214" r="2" fill="#0a0a0a"/>
    <circle cx="750" cy="202" r="2" fill="#0a0a0a"/>
    <circle cx="767" cy="195" r="2" fill="#0a0a0a"/>
    <circle cx="767" cy="209" r="2" fill="#0a0a0a"/>
    <circle cx="753" cy="209" r="2" fill="#0a0a0a"/>
    <circle cx="753" cy="195" r="2" fill="#0a0a0a"/>
    
    <!-- Tape spool (brown magnetic tape) -->
    <path d="M 440,202 Q 500,175 550,190 Q 600,205 650,190 Q 700,175 760,202" 
          fill="none" stroke="#3d2817" stroke-width="6" opacity="0.6"/>
    <path d="M 440,202 Q 500,229 550,214 Q 600,199 650,214 Q 700,229 760,202" 
          fill="none" stroke="#3d2817" stroke-width="6" opacity="0.6"/>
  </g>
  
  <!-- Tape guides -->
  <circle cx="380" cy="202" r="5" fill="#333333"/>
  <circle cx="820" cy="202" r="5" fill="#333333"/>
  
  <!-- Bottom tape pad -->
  <rect x="340" y="230" width="520" height="8" rx="4" fill="#222222"/>
  <rect x="340" y="232" width="520" height="3" rx="1.5" fill="#2a2a2a"/>
  
  <!-- Bottom screw holes -->
  <circle cx="170" cy="250" r="4" fill="#111111" stroke="#333333" stroke-width="1"/>
  <circle cx="1030" cy="250" r="4" fill="#111111" stroke="#333333" stroke-width="1"/>
  
  <!-- Top notches (cassette tabs) -->
  <rect x="350" y="30" width="80" height="15" rx="3" fill="#0d0d0d"/>
  <rect x="770" y="30" width="80" height="15" rx="3" fill="#0d0d0d"/>
  
  <!-- Side A indicator -->
  <text x="190" y="220" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#555555" letter-spacing="2">SIDE W →</text>
  
  <!-- Play arrow -->
  <polygon points="1035,215 1035,235 1055,225" fill="#444444" opacity="0.5"/>
  
  <!-- Subtle top-left branding -->
  <text x="40" y="30" font-family="JetBrains Mono, monospace" font-size="8" fill="#333333" letter-spacing="2">HI-FI STEREO</text>
  <text x="40" y="265" font-family="JetBrains Mono, monospace" font-size="8" fill="#333333" letter-spacing="2">NORMAL BIAS • 120 μs EQ</text>
</svg>