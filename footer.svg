<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 150">
  <rect width="1200" height="150" fill="#0d0d0d"/>
  
  <!-- Subtle bottom shelf/surface -->
  <rect x="0" y="130" width="1200" height="20" fill="#0a0a0a"/>
  
  <!-- Vinyl record half (like it's on the shelf) -->
  <g transform="translate(950, 95)">
    <ellipse cx="0" cy="0" rx="55" ry="55" fill="#111111"/>
    <ellipse cx="0" cy="0" rx="50" ry="50" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <ellipse cx="0" cy="0" rx="45" ry="45" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <ellipse cx="0" cy="0" rx="40" ry="40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <ellipse cx="0" cy="0" rx="35" ry="35" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="15" fill="#e0e0e0"/>
    <circle cx="0" cy="0" r="2" fill="#000000"/>
    <text x="0" y="3" font-family="JetBrains Mono, monospace" font-size="4" font-weight="bold" fill="#000000" text-anchor="middle">B</text>
  </g>
  
  <!-- Side B text -->
  <text x="950" y="170" font-family="JetBrains Mono, monospace" font-size="8" fill="#555555" text-anchor="middle" letter-spacing="2">SIDE B</text>
  
  <!-- Waveform decoration -->
  <path d="M40,65 Q60,40 80,65 T120,65 T160,65 T200,65 T240,65 T280,65 T320,65 T360,65 T400,65" 
        fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  
  <!-- Technical specs text -->
  <text x="40" y="85" font-family="JetBrains Mono, monospace" font-size="9" fill="#444444" letter-spacing="1">AWTOPRIME25 RECORDS LTD.  ALL RIGHTS RESERVED.</text>
  <text x="40" y="100" font-family="JetBrains Mono, monospace" font-size="8" fill="#333333" letter-spacing="1">ENGINEERED WITH C++ • TYPESCRIPT • PYTHON</text>
  
  <!-- Time markers like a tape -->
  <text x="750" y="85" font-family="JetBrains Mono, monospace" font-size="10" fill="#555555" letter-spacing="2">00:00:00</text>
  <text x="750" y="100" font-family="JetBrains Mono, monospace" font-size="8" fill="#333333" letter-spacing="1">ELAPSED TIME</text>
  
  <!-- Play indicator -->
  <polygon points="1110,70 1110,90 1130,80" fill="#ffffff" opacity="0.8"/>
  <text x="1145" y="84" font-family="JetBrains Mono, monospace" font-size="10" fill="#555555" letter-spacing="1">PLAYING</text>
  
  <!-- Bottom scanline -->
  <line x1="0" y1="148" x2="1200" y2="148" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
</svg>